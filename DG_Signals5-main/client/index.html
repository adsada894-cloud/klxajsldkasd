n.callMethod.apply(n,arguments):n.queue.push(arguments)};

n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)}(window, document,'script',

    <script>
    /**
     * Gelişmiş CAPI ve Pixel Gönderim Fonksiyonu
     * test_event_code: TEST27679 entegre edildi.
     * Telegram Button Tracking: Telegram butonu tıklamalarını takip eder.
     */
    function capiSend(event_name, custom_data = {}) {
        try {
            // Benzersiz Event ID oluşturma (Deduplication için kritik)
            var event_id = (crypto && crypto.randomUUID)
                ? crypto.randomUUID()
                : (Date.now() + "_" + Math.random().toString(16).slice(2));
            
            // Sunucuya (CAPI) gidecek veri paketi
            var payload = {
                event_name: event_name,
                event_id: event_id,
                event_source_url: window.location.href,
                user_agent: navigator.userAgent,
                test_event_code: "TEST27679",
                custom_data: custom_data
            };

            // API İsteği
            fetch("/api/meta-capi", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
                keepalive: true
            }).catch(function(err) { console.log("CAPI Error:", err); });

            // Tarayıcı Pixel Takibi
            if (typeof fbq === "function") {
                fbq('track', event_name, custom_data, { eventID: event_id });
            }
        } catch (e) {
            console.error("Tracking Error:", e);
        }
    }
    
    // Sayfa yüklendiğinde PageView ve ViewContent gönder
    window.addEventListener('DOMContentLoaded', function() {
        capiSend("PageView");
        capiSend("ViewContent", { content_name: "Homepage", content_category: "Landing" });
    });
    </script>
</head>

<body>
    <noscript>
        <img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=1626916708298868&ev=PageView&noscript=1" />
        <img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=1445233537066661&ev=PageView&noscript=1" />
    </noscript>

    <div id="root"></div>
    <div style="height:1px;opacity:0;" data-fp="dg5" aria-hidden="true"></div>
    
    <script type="module" src="/src/main.tsx"></script>

    <script>
    document.addEventListener("click", function(e) {
        // Telegram butonu kontrolü
        var telegramEl = e.target.closest("[data-track-telegram]");
        if (telegramEl) {
            capiSend("Lead", { 
                content_name: "Telegram Channel Access",
                content_category: "Social Channel"
            });
            return;
        }

        // Lead butonu kontrolü
        var leadEl = e.target.closest("[data-track-lead]");
        if (leadEl) {
            capiSend("Lead", { content_name: leadEl.innerText || "Lead Button" });
            return;
        }

        // E-ticaret için Sepete Ekle butonu
        var cartEl = e.target.closest("[data-track-cart]");
        if (cartEl) {
            capiSend("AddToCart", { currency: "USD", value: 0.00 });
        }
    });
    </script>
</body>
